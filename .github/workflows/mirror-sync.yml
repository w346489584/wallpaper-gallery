name: Mirror Sync from Upstream

on:
  workflow_dispatch:
  schedule:
    # 每天北京时间 03:20（UTC 19:20）同步一次
    - cron: '20 19 * * *'

permissions:
  contents: write

concurrency:
  group: mirror-sync
  cancel-in-progress: true

jobs:
  mirror-sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout current repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Configure upstream remote
        run: |
          git remote remove upstream 2>/dev/null || true
          git remote add upstream https://github.com/IT-NuanxinPro/wallpaper-gallery.git

      - name: Fetch upstream
        run: git fetch upstream main --tags --force

      - name: Sync upstream tree (excluding .github/workflows)
        run: |
          TMPDIR=$(mktemp -d)
          trap 'rm -rf "$TMPDIR"' EXIT

          # 导出上游 main 分支文件树到临时目录
          git archive upstream/main | tar -x -C "$TMPDIR"

          # 同步除 workflows 目录外的全部内容
          rsync -a --delete \
            --exclude='.git' \
            --exclude='.github/workflows/' \
            "$TMPDIR"/ ./

      - name: Commit and push
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: mirror upstream $(date -u +%Y-%m-%d)"
            git push origin main
          fi

      - name: Sync tags
        run: git push origin --tags 2>/dev/null || true

      - name: Summary
        run: |
          echo "Mirror sync completed." >> "$GITHUB_STEP_SUMMARY"
          echo "Current HEAD:" >> "$GITHUB_STEP_SUMMARY"
          git log -1 --oneline >> "$GITHUB_STEP_SUMMARY"
