name: Mirror Sync from Upstream

on:
  workflow_dispatch:
  schedule:
    # 每天北京时间 03:20（UTC 19:20）同步一次
    - cron: '20 19 * * *'

permissions:
  contents: write

concurrency:
  group: mirror-sync
  cancel-in-progress: true

jobs:
  mirror-sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout current repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.MIRROR_SYNC_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Preserve mirror workflow
        run: |
          mkdir -p /tmp/mirror-workflow
          cp .github/workflows/mirror-sync.yml /tmp/mirror-workflow/mirror-sync.yml

      - name: Configure upstream remote
        run: |
          git remote remove upstream 2>/dev/null || true
          git remote add upstream https://github.com/IT-NuanxinPro/wallpaper-gallery.git
          git remote -v

      - name: Fetch upstream
        run: |
          git fetch upstream main --tags --force

      - name: Mirror upstream/main and keep only mirror workflow
        run: |
          git checkout main
          git reset --hard upstream/main
          rm -rf .github/workflows
          mkdir -p .github/workflows
          cp /tmp/mirror-workflow/mirror-sync.yml .github/workflows/mirror-sync.yml
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: mirror upstream"
          git push origin main

      - name: Summary
        run: |
          echo "Mirrored upstream/main to origin/main successfully." >> "$GITHUB_STEP_SUMMARY"
          echo "Current HEAD:" >> "$GITHUB_STEP_SUMMARY"
          git log -1 --oneline >> "$GITHUB_STEP_SUMMARY"
